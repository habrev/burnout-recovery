services:
  # Django backend
  - type: web
    name: reset-backend
    runtime: python
    plan: starter
    rootDir: backend
    buildCommand: ./build.sh
    startCommand: gunicorn reset_project.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: reset_project.settings.production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: reset-db
          property: connectionString
      - key: GEMINI_API_KEY
        sync: false
      - key: EMAIL_HOST
        value: smtp.gmail.com
      - key: EMAIL_PORT
        value: "465"
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: DEFAULT_FROM_EMAIL
        sync: false
      - key: ALLOWED_HOSTS
        value: reset-backend-7vl8.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://reset-frontend-9f8s.onrender.com
      - key: OTP_EXPIRY_MINUTES
        value: "10"
      - key: ADMIN_EMAILS
        sync: false
      - key: USE_HTTPS
        value: "true"

  # React frontend (static site)
  - type: web
    name: reset-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://reset-backend-7vl8.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: reset-db
    plan: free
    databaseName: reset_db
    user: reset_user